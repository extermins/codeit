  <body>
    <header class="header">
      <nav class="nav">
        <img class="logo" src="./image/logo.png" />
        <button
          class="login-button"
          onclick="location.href = './login/login.html'"
        >
          로그인
        </button>
      </nav>
    </header>

    <main>
      <section class="section-hero">
        <div class="section-hero-wrap">
          <div class="section-hero-main">
            <div class="hero-info-wrap">
              <p class="hero-info-text">일상의 모든 물건을 거래해 보세요</p>
              <button class="hero-info-button">구경하러 가기</button>
            </div>
            <img src="./image/home_top.png" class="hero-img" />
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-wrap">
          <img src="./image/section2.png" class="section-img" />
          <div class="section-info-wrap">
            <div class="info-tag">Hot item</div>
            <div class="info-title">
              인기 상품을<br />
              확인해 보세요
            </div>
            <div class="info-text">
              가장 HOT한 중고거래 물품을<br />
              판다 마켓에서 확인해 보세요
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-wrap">
          <div class="section-info-wrap-left">
            <div class="info-tag">Search</div>
            <div class="info-title">
              구매를 원하는<br />
              상품을 검색하세요
            </div>
            <p class="info-text">
              구매하고 싶은 물품은 검색하서<br />
              쉽게 찾으세요
            </p>
          </div>
          <img src="./image/section3.png" class="section-img-left" />
        </div>
      </section>

      <section class="section">
        <div class="section-wrap">
          <img src="./image/section4.png" class="section-img" />
          <div class="section-info-wrap">
            <div class="info-tag">Register</div>
            <p class="info-title">
              판매를 원하는<br />
              물품을 등록하세요
            </p>
            <p class="info-text">
              어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요
            </p>
          </div>
        </div>
      </section>
    </main>
